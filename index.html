<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Shift Racing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
  }
  h1 {
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #f0c040;
    margin-bottom: 8px;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 800px;
    padding: 6px 12px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-bottom: none;
    font-size: 0.82rem;
  }
  .p1hud { color: #4af; }
  .p2hud { color: #f74; }
  canvas {
    display: block;
    border: 2px solid #444;
    cursor: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.78);
    z-index: 10;
  }
  #overlay h2 { font-size: 2rem; letter-spacing: 0.2em; margin-bottom: 10px; color: #f0c040; }
  #overlay p  { font-size: 0.9rem; color: #aaa; margin: 3px 0; }
  #overlay .controls { margin: 16px 0 20px; font-size: 0.8rem; line-height: 1.9; }
  #overlay .controls span { display: inline-block; min-width: 130px; }
  #overlay .p1c { color: #4af; }
  #overlay .p2c { color: #f74; }
  #startBtn {
    padding: 10px 36px;
    background: #f0c040;
    color: #111;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    font-weight: bold;
    letter-spacing: 0.15em;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
  }
  #startBtn:hover { background: #ffd060; }
  #wrapper { position: relative; }
</style>
</head>
<body>
<h1>Split Shift Racing</h1>
<div id="hud">
  <span class="p1hud" id="p1info">P1 (WASD) — Lap: 1 / 3 &nbsp;|&nbsp; Best: --</span>
  <span id="raceStatus">GET READY</span>
  <span class="p2hud" id="p2info">Best: -- &nbsp;|&nbsp; Lap: 1 / 3 — P2 (↑↓←→)</span>
</div>
<div id="wrapper">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="overlay">
    <h2>SPLIT SHIFT RACING</h2>
    <p>First to complete <strong>3 laps</strong> wins!</p>
    <div class="controls">
      <span class="p1c">P1 — WASD:</span> W/S = throttle/brake &nbsp; A/D = steer<br>
      <span class="p2c">P2 — Arrows:</span> ↑/↓ = throttle/brake &nbsp; ←/→ = steer<br>
      <span style="color:#888">Off-track:</span> Speed penalized heavily
    </div>
    <button id="startBtn">START RACE</button>
  </div>
</div>

<script>
(() => {
"use strict";

// ─── Canvas & Context ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 600;

// ─── Track Definition ────────────────────────────────────────────────────────
// Outer polygon and inner polygon define the drivable tarmac band.
// Built as a rounded-rectangle-ish closed loop.

const OUTER = buildRoundedRect(60, 50, 680, 500, 90);
const INNER = buildRoundedRect(190, 160, 420, 280, 55);

function buildRoundedRect(x, y, w, h, r) {
  // Returns an array of {x,y} points approximating a rounded rect.
  const pts = [];
  const steps = 24; // per corner
  const corners = [
    { cx: x+r,   cy: y+r,   a0: Math.PI,     a1: 1.5*Math.PI },
    { cx: x+w-r, cy: y+r,   a0: 1.5*Math.PI, a1: 2*Math.PI   },
    { cx: x+w-r, cy: y+h-r, a0: 0,            a1: 0.5*Math.PI },
    { cx: x+r,   cy: y+h-r, a0: 0.5*Math.PI,  a1: Math.PI     },
  ];
  for (const c of corners) {
    for (let i = 0; i <= steps; i++) {
      const a = c.a0 + (c.a1 - c.a0) * (i / steps);
      pts.push({ x: c.cx + Math.cos(a)*r, y: c.cy + Math.sin(a)*r });
    }
  }
  return pts;
}

// Pre-build the track path for hit-testing via offscreen canvas
const offCanvas = document.createElement('canvas');
offCanvas.width = W; offCanvas.height = H;
const offCtx = offCanvas.getContext('2d');

function buildOffscreenTrack() {
  offCtx.clearRect(0, 0, W, H);
  // Fill track area white (drivable), rest black
  offCtx.fillStyle = '#000';
  offCtx.fillRect(0, 0, W, H);
  offCtx.fillStyle = '#fff';
  tracePath(offCtx, OUTER);
  offCtx.fill('evenodd'); // outer minus inner
  // Punch out inner
  offCtx.fillStyle = '#000';
  tracePath(offCtx, INNER);
  offCtx.fill();
}

function tracePath(c, pts) {
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
  c.closePath();
}

function isOnTrack(px, py) {
  if (px < 0 || py < 0 || px >= W || py >= H) return false;
  const d = offCtx.getImageData(Math.round(px), Math.round(py), 1, 1).data;
  return d[0] > 128; // white = track
}

// Finish line: a horizontal stripe just below the top straight
const FINISH_X = 320;
const FINISH_Y = 66;
const FINISH_W = 160;
const FINISH_H = 14;

// ─── Checkpoint system ──────────────────────────────────────────────────────
// Three phantom gates spaced around the track. Cars must pass all gates
// before the finish counts — prevents backward shortcuts.
const GATES = [
  { x: 620, y: 285, w: 16, h: 120 },  // right straight
  { x: 310, y: 500, w: 180, h: 16 },  // bottom straight
  { x: 65,  y: 230, w: 16, h: 140 },  // left straight
];

// ─── Car ────────────────────────────────────────────────────────────────────
const TOTAL_LAPS = 3;

class Car {
  constructor(x, y, angle, color, accentColor) {
    this.x = x; this.y = y;
    this.angle = angle;  // radians, 0 = right
    this.vx = 0; this.vy = 0;
    this.speed = 0;
    this.steer = 0;
    this.color  = color;
    this.accentColor = accentColor;

    // state
    this.onTrack = true;
    this.lap = 1;
    this.gatesCleared = new Set();
    this.lapStartTime = null;
    this.bestLap = null;
    this.finished = false;
    this.finishTime = null;

    // control inputs
    this.throttle = 0; // 1 fwd, -1 rev
    this.steerInput = 0; // -1 left, 1 right
  }

  update(dt) {
    if (this.finished) return;

    const MAX_SPEED      = this.onTrack ? 220 : 55;
    const MAX_REV_SPEED  = this.onTrack ? 80  : 20;
    const ACCEL          = this.onTrack ? 260 : 65;
    const BRAKE_FORCE    = 340;
    const FRICTION       = this.onTrack ? 0.97 : 0.88;
    const STEER_RATE     = 2.6;  // rad/s at full speed
    const MIN_STEER_SPD  = 15;

    // Throttle / brake
    if (this.throttle > 0) {
      this.speed += ACCEL * dt * this.throttle;
    } else if (this.throttle < 0) {
      if (this.speed > 0) {
        this.speed -= BRAKE_FORCE * dt;
        if (this.speed < 0) this.speed = 0;
      } else {
        this.speed += ACCEL * 0.6 * dt * this.throttle;
      }
    }

    // Clamp speed
    this.speed = Math.max(-MAX_REV_SPEED, Math.min(MAX_SPEED, this.speed));

    // Friction when no throttle
    if (this.throttle === 0) {
      this.speed *= FRICTION;
      if (Math.abs(this.speed) < 1) this.speed = 0;
    }

    // Steering (speed-sensitive)
    const absSpd = Math.abs(this.speed);
    if (absSpd > MIN_STEER_SPD) {
      const steerEfficiency = Math.min(1, absSpd / 80);
      const dir = this.speed >= 0 ? 1 : -1;
      this.angle += this.steerInput * STEER_RATE * steerEfficiency * dt * dir;
    }

    // Move
    const newX = this.x + Math.cos(this.angle) * this.speed * dt;
    const newY = this.y + Math.sin(this.angle) * this.speed * dt;

    // Collision: push back from walls
    this.onTrack = isOnTrack(newX, newY);
    if (this.onTrack) {
      this.x = newX;
      this.y = newY;
    } else {
      // Try to slide along X or Y only
      const slideX = isOnTrack(newX, this.y);
      const slideY = isOnTrack(this.x, newY);
      if (slideX) { this.x = newX; }
      if (slideY) { this.y = newY; }
      // Hard penalty: kill most speed on collision
      if (!slideX && !slideY) {
        this.speed *= -0.3;
      } else {
        this.speed *= 0.5;
      }
      this.onTrack = isOnTrack(this.x, this.y);
    }

    // ── Gate tracking ────────────────────────────────────────────
    GATES.forEach((g, i) => {
      if (!this.gatesCleared.has(i)) {
        if (this.x >= g.x && this.x <= g.x + g.w &&
            this.y >= g.y && this.y <= g.y + g.h) {
          this.gatesCleared.add(i);
        }
      }
    });

    // ── Finish line ──────────────────────────────────────────────
    if (this.gatesCleared.size === GATES.length) {
      if (this.x >= FINISH_X && this.x <= FINISH_X + FINISH_W &&
          this.y >= FINISH_Y && this.y <= FINISH_Y + FINISH_H) {
        this.gatesCleared.clear();
        const now = performance.now();
        if (this.lapStartTime !== null) {
          const lapTime = (now - this.lapStartTime) / 1000;
          if (this.bestLap === null || lapTime < this.bestLap) this.bestLap = lapTime;
        }
        this.lapStartTime = now;

        if (this.lap >= TOTAL_LAPS) {
          this.finished = true;
          this.finishTime = now;
        } else {
          this.lap++;
        }
      }
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    const L = 20, W = 11;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(2, 2, L*0.55, W*0.5, 0, 0, Math.PI*2);
    ctx.fill();

    // Body
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.roundRect(-L, -W, L*2, W*2, 4);
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#1a2a3a';
    ctx.beginPath();
    ctx.roundRect(-4, -W+3, 14, (W-3)*2, 2);
    ctx.fill();

    // Front stripe / nose
    ctx.fillStyle = this.accentColor;
    ctx.fillRect(L-5, -W, 5, W*2);

    // Wheels
    ctx.fillStyle = '#222';
    const wheelW = 5, wheelH = 7;
    [[-L+3, -W-1], [-L+3, W-wheelH+1], [L-8, -W-1], [L-8, W-wheelH+1]].forEach(([wx, wy]) => {
      ctx.fillRect(wx, wy, wheelW, wheelH);
    });

    ctx.restore();
  }
}

// ─── Input ──────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); }, { passive: false });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// ─── Game State ─────────────────────────────────────────────────────────────
let car1, car2, rafId, lastTime, raceStarted, winner;

function initGame() {
  // Start positions on top straight
  car1 = new Car(380, 80, 0, '#3399ff', '#00ffcc');
  car2 = new Car(380, 100, 0, '#ff6633', '#ffdd00');
  // Stagger laterally won't work well on straight — offset along track instead
  car1.x = 360; car1.y = 80;
  car2.x = 400; car2.y = 80;
  raceStarted = false;
  winner = null;
}

// ─── Countdown ──────────────────────────────────────────────────────────────
let countdownVal = 0;
let countdownStart = 0;
const COUNT_DURATION = 3500; // ms for "3 2 1 GO"

// ─── HUD update ─────────────────────────────────────────────────────────────
function fmt(s) {
  if (s === null) return '--';
  const m = Math.floor(s / 60);
  const sec = (s - m*60).toFixed(2).padStart(5,'0');
  return m > 0 ? `${m}:${sec}` : `${sec}s`;
}

function updateHUD() {
  const p1El = document.getElementById('p1info');
  const p2El = document.getElementById('p2info');
  const stEl = document.getElementById('raceStatus');

  p1El.textContent = `P1 (WASD) — Lap: ${Math.min(car1.lap, TOTAL_LAPS)} / ${TOTAL_LAPS}  |  Best: ${fmt(car1.bestLap)}`;
  p2El.textContent = `Best: ${fmt(car2.bestLap)}  |  Lap: ${Math.min(car2.lap, TOTAL_LAPS)} / ${TOTAL_LAPS} — P2 (↑↓←→)`;

  if (!raceStarted) {
    stEl.textContent = 'GET READY';
  } else if (winner) {
    stEl.textContent = winner === 1 ? '🏆 P1 WINS!' : '🏆 P2 WINS!';
  } else {
    stEl.textContent = 'RACING';
  }
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function drawTrack() {
  // Background grass
  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(0, 0, W, H);

  // Grass texture dots
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  for (let gx = 0; gx < W; gx += 16)
    for (let gy = 0; gy < H; gy += 16) {
      ctx.beginPath();
      ctx.arc(gx+4, gy+4, 2, 0, Math.PI*2);
      ctx.fill();
    }

  // Tarmac (outer)
  ctx.fillStyle = '#555';
  tracePath(ctx, OUTER);
  ctx.fill();

  // Inner grass island
  ctx.fillStyle = '#2d5a1b';
  tracePath(ctx, INNER);
  ctx.fill();

  // Inner curb (red/white striped border)
  drawCurb(INNER, 6);
  // Outer curb
  drawCurb(OUTER, 7, true);

  // Road markings — center dashed white line
  drawCenterLine();

  // Finish line
  drawCheckerFinish();
}

function drawCurb(pts, width, outer = false) {
  const segCount = pts.length;
  for (let i = 0; i < segCount; i++) {
    const a = pts[i];
    const b = pts[(i+1) % segCount];
    ctx.strokeStyle = i % 2 === 0 ? '#cc2222' : '#eeeeee';
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
}

function drawCenterLine() {
  // Midpoints between outer and inner polygons — approximate
  const count = Math.min(OUTER.length, INNER.length);
  ctx.setLineDash([14, 12]);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < count; i++) {
    const o = OUTER[i], n = INNER[i];
    const mx = (o.x + n.x) / 2;
    const my = (o.y + n.y) / 2;
    i === 0 ? ctx.moveTo(mx, my) : ctx.lineTo(mx, my);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawCheckerFinish() {
  const sq = 14;
  const cols = Math.ceil(FINISH_W / sq);
  const rows = Math.ceil(FINISH_H / sq);
  for (let col = 0; col < cols; col++) {
    for (let row = 0; row < rows; row++) {
      ctx.fillStyle = (col + row) % 2 === 0 ? '#fff' : '#000';
      ctx.fillRect(FINISH_X + col*sq, FINISH_Y + row*sq, sq, sq);
    }
  }
  // Highlight
  ctx.strokeStyle = '#f0c040';
  ctx.lineWidth = 2;
  ctx.strokeRect(FINISH_X, FINISH_Y, FINISH_W, FINISH_H);

  ctx.fillStyle = '#f0c040';
  ctx.font = 'bold 9px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('FINISH', FINISH_X + FINISH_W/2, FINISH_Y - 4);
}

function drawCountdown(elapsed) {
  const phase = elapsed / COUNT_DURATION; // 0→1
  let label = '';
  let color = '#fff';
  if (phase < 0.25)      { label = '3'; color = '#f74'; }
  else if (phase < 0.5)  { label = '2'; color = '#f0c040'; }
  else if (phase < 0.75) { label = '1'; color = '#4af'; }
  else                   { label = 'GO!'; color = '#4f4'; }

  const pulse = Math.abs(Math.sin((elapsed % 900) / 900 * Math.PI));
  const size = 80 + pulse * 20;

  ctx.save();
  ctx.globalAlpha = 0.92;
  ctx.font = `bold ${size}px Courier New`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = 30;
  ctx.fillText(label, W/2, H/2);
  ctx.restore();
}

function drawWinner() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = 'bold 60px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = winner === 1 ? '#4af' : '#f74';
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 40;
  ctx.fillText(`P${winner} WINS!`, W/2, H/2 - 30);
  ctx.font = '20px Courier New';
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ccc';
  ctx.fillText('Press ENTER to restart', W/2, H/2 + 30);
  ctx.restore();
}

function drawSpeedometer(car, x, y, label, color) {
  const spd = Math.round(Math.abs(car.speed));
  const maxSpd = 220;
  const ratio = Math.min(1, spd / maxSpd);

  ctx.save();
  ctx.globalAlpha = 0.85;

  // Background pill
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect(x, y, 90, 28, 5);
  ctx.fill();

  // Bar
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.5 + ratio * 0.5;
  ctx.beginPath();
  ctx.roundRect(x+2, y+2, 86 * ratio, 24, 4);
  ctx.fill();

  // Text
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`${label} ${spd} km/h`, x + 6, y + 18);
  ctx.restore();
}

// ─── Main Loop ───────────────────────────────────────────────────────────────
function processInput() {
  // Player 1 — WASD
  car1.throttle   = keys['KeyW'] ? 1 : keys['KeyS'] ? -1 : 0;
  car1.steerInput = keys['KeyA'] ? -1 : keys['KeyD'] ? 1 : 0;

  // Player 2 — Arrows
  car2.throttle   = keys['ArrowUp'] ? 1 : keys['ArrowDown'] ? -1 : 0;
  car2.steerInput = keys['ArrowLeft'] ? -1 : keys['ArrowRight'] ? 1 : 0;
}

function update(dt) {
  processInput();
  car1.update(dt);
  car2.update(dt);

  if (!winner) {
    if (car1.finished) winner = 1;
    else if (car2.finished) winner = 2;
  }
}

function draw(elapsed) {
  ctx.clearRect(0, 0, W, H);
  drawTrack();
  car1.draw(ctx);
  car2.draw(ctx);

  // Speedometers
  drawSpeedometer(car1, 6, 6, 'P1', '#4af');
  drawSpeedometer(car2, W - 96, 6, 'P2', '#f74');

  // Off-track warning
  if (!car1.onTrack) {
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#f00';
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('⚠ P1 OFF TRACK', 8, H - 10);
    ctx.restore();
  }
  if (!car2.onTrack) {
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#f00';
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText('P2 OFF TRACK ⚠', W - 8, H - 10);
    ctx.restore();
  }
}

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  const elapsed = ts - countdownStart;

  if (!raceStarted) {
    draw(elapsed);
    drawCountdown(elapsed);
    if (elapsed >= COUNT_DURATION) {
      raceStarted = true;
      car1.lapStartTime = performance.now();
      car2.lapStartTime = performance.now();
    }
  } else if (winner) {
    update(dt);
    draw(elapsed);
    drawWinner();
    // restart on Enter
    if (keys['Enter']) {
      startRace();
      return;
    }
  } else {
    update(dt);
    draw(elapsed);
  }

  updateHUD();
  rafId = requestAnimationFrame(loop);
}

function startRace() {
  if (rafId) cancelAnimationFrame(rafId);
  initGame();
  buildOffscreenTrack();
  lastTime = null;
  countdownStart = performance.now();
  rafId = requestAnimationFrame(loop);
}

// ─── Boot ─────────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  startRace();
});

// Pre-draw track to show something on load
buildOffscreenTrack();
drawTrack();

})();
</script>
</body>
</html>
